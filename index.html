<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Cuestionario desde Excel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel para JSX en el navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- SheetJS para leer Excel -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <!-- canvas-confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>
  <div id="root">Cargando...</div>

  <script>
    (function () {
      var missing = [];
      if (typeof React === "undefined") missing.push("React");
      if (typeof ReactDOM === "undefined") missing.push("ReactDOM");
      if (typeof XLSX === "undefined") missing.push("SheetJS (XLSX)");
      if (typeof confetti === "undefined") missing.push("canvas-confetti");
      if (typeof Babel === "undefined") missing.push("Babel");

      if (missing.length) {
        var root = document.getElementById("root");
        root.innerHTML =
          '<div style="font-family: system-ui, Segoe UI, sans-serif; padding: 16px; max-width: 720px; margin: 24px auto; border: 1px solid rgba(0,0,0,.15); border-radius: 12px;">' +
          "<h2 style=\"margin:0 0 8px;\">No se pudieron cargar librerías</h2>" +
          "<p style=\"margin:0 0 8px;\">Faltan: <b>" +
          missing.join(", ") +
          "</b></p>" +
          "<p style=\"margin:0;\">Asegúrate de tener internet y vuelve a abrir <code>index.html</code>. Si prefieres, puedes ejecutar un servidor local (por ejemplo, Live Server) y abrir la app desde <code>http://localhost</code>.</p>" +
          "</div>";
      }
    })();
  </script>

  <script type="text/babel" data-presets="env,react">
    if (!window.React || !window.ReactDOM || !window.XLSX) {
      // Si faltan librerías, dejamos el mensaje de diagnóstico.
    } else {
      const { useState, useEffect, useMemo, useRef } = React;

      function shuffleArray(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      function Clock({ highContrast }) {
        const [time, setTime] = useState(new Date());

        useEffect(() => {
          const timer = setInterval(() => setTime(new Date()), 1000);
          return () => clearInterval(timer);
        }, []);

        const minutes = time.getMinutes();
        const seconds = time.getSeconds();
        const hours = time.getHours();
        const isPM = hours >= 12;

        // Calculate progress smoothly over a 24 hour period
        // 24 hours * 60 minutes * 60 seconds
        const totalSecondsInDay = 24 * 60 * 60;
        const currentSeconds = (hours * 60 * 60) + (minutes * 60) + seconds;
        const progress = currentSeconds / totalSecondsInDay;

        // SVG Circle math
        const radius = 120;
        const circumference = 2 * Math.PI * radius;
        const strokeDashoffset = circumference - progress * circumference;

        // Water fill math (0 to 60 minutes)
        const minuteProgress = minutes / 60;
        
        // El círculo empieza visualmente más arriba (por el radio y el clipPath)
        // Mapeamos el progreso para que en 0 min esté en y=260 (apenas visible) 
        // y en 60 min esté en y=20 (lleno completamente)
        const waterY = 260 - (240 * minuteProgress);

        // Formato 12 horas: medianoche es 0, mediodía es 12
        const displayHours = hours === 12 ? 12 : hours % 12;
        const displayMinutes = minutes < 10 ? '0' + minutes : minutes;
        const displayTime = `${displayHours}:${displayMinutes}`;

        return (
          <div className="clock-container">
            <svg className="clock-svg" width="280" height="280" viewBox="0 0 280 280">
              <defs>
                <clipPath id="circleMask">
                  <circle cx="140" cy="140" r={radius - 6} />
                </clipPath>
              </defs>
              {/* Background circle */}
              <circle
                className="clock-circle-bg"
                cx="140"
                cy="140"
                r={radius}
                strokeWidth="12"
                fill="none"
                style={{ opacity: highContrast ? 0.6 : 1, transition: 'opacity 0.2s', stroke: highContrast ? 'rgba(255,255,255,0.4)' : '#1f2937' }}
              />
              {/* Water fill group */}
              <g clipPath="url(#circleMask)">
                <g
                  style={{
                    transform: `translateY(${waterY}px)`,
                    transition: 'transform 1s ease-in-out'
                  }}
                >
                  {/* Back wave */}
                  <path
                    className={`clock-water-wave clock-water-wave-2 ${isPM ? 'pm-color' : ''}`}
                    style={{ opacity: highContrast ? 0.35 : 0.25, transition: 'opacity 0.2s', fill: highContrast ? '#ffffff' : '' }}
                    d="M 0 0 Q 70 12, 140 0 T 280 0 T 420 0 T 560 0 V 320 H 0 Z"
                  />
                  {/* Front wave */}
                  <path
                    className={`clock-water-wave ${isPM ? 'pm-color' : ''}`}
                    style={{ opacity: highContrast ? 0.5 : 0.25, transition: 'opacity 0.2s', fill: highContrast ? '#ffffff' : '' }}
                    d="M 0 0 Q 70 -12, 140 0 T 280 0 T 420 0 T 560 0 V 320 H 0 Z"
                  />
                </g>
              </g>
              {/* Progress circle */}
              <circle
                className={`clock-circle-progress ${isPM ? 'pm-color' : ''}`}
                cx="140"
                cy="140"
                r={radius}
                strokeWidth="12"
                fill="none"
                strokeDasharray={circumference}
                strokeDashoffset={strokeDashoffset}
                strokeLinecap="round"
                transform="rotate(-90 140 140)"
                style={{ opacity: highContrast ? 0.7 : 1, transition: 'opacity 0.2s' }}
              />
            </svg>
            <div className="clock-text">
              {displayTime}
            </div>
          </div>
        );
      }

      function App() {
        const [rawRows, setRawRows] = useState(() => {
          const saved = localStorage.getItem('cuestionario_rawRows');
          return saved ? JSON.parse(saved) : [];
        });
        const [questions, setQuestions] = useState(() => {
          const saved = localStorage.getItem('cuestionario_questions');
          return saved ? JSON.parse(saved) : [];
        });
        const [currentIndex, setCurrentIndex] = useState(() => {
          const saved = localStorage.getItem('cuestionario_currentIndex');
          return saved ? parseInt(saved, 10) : 0;
        });
        const [options, setOptions] = useState([]);
        const [selectedOption, setSelectedOption] = useState(null);
        const [feedback, setFeedback] = useState(null);
        const [score, setScore] = useState(() => {
          const saved = localStorage.getItem('cuestionario_score');
          return saved ? parseFloat(saved) : 0;
        });
        const [correctCount, setCorrectCount] = useState(() => {
          const saved = localStorage.getItem('cuestionario_correctCount');
          return saved ? parseInt(saved, 10) : 0;
        });
        const [wrongCount, setWrongCount] = useState(() => {
          const saved = localStorage.getItem('cuestionario_wrongCount');
          return saved ? parseInt(saved, 10) : 0;
        });
        const [gameStarted, setGameStarted] = useState(() => {
          return localStorage.getItem('cuestionario_gameStarted') === 'true';
        });
        const [gameOver, setGameOver] = useState(() => {
          return localStorage.getItem('cuestionario_gameOver') === 'true';
        });
        const [loadingFile, setLoadingFile] = useState(false);
        const [disabledOptions, setDisabledOptions] = useState(() => {
          const saved = localStorage.getItem('cuestionario_disabledOptions');
          return saved ? JSON.parse(saved) : [];
        });
        const [failedQuestions, setFailedQuestions] = useState(() => {
          const saved = localStorage.getItem('cuestionario_failedQuestions');
          return saved ? JSON.parse(saved) : [];
        });
        const [gameMode, setGameMode] = useState(() => {
          return localStorage.getItem('cuestionario_gameMode') || null;
        });
        const [revealed, setRevealed] = useState(false);
        const [confirm, setConfirm] = useState(null); // { message, onAccept }
        const timeoutRef = useRef(null);
        const sfxCorrect = useRef(new Audio("music/Correcto.mp3"));
        const sfxError = useRef(new Audio("music/Error.mp3"));
        const sfxCelebration = useRef(new Audio("music/Celebration.mp3"));
        const celebrationUnlocked = useRef(false);
        const [highContrast, setHighContrast] = useState(false);
        const gradientRef = useRef(null);

        const totalQuestions = questions.length;

        // --- Persistent Storage Sync ---
        useEffect(() => { localStorage.setItem('cuestionario_rawRows', JSON.stringify(rawRows)); }, [rawRows]);
        useEffect(() => { localStorage.setItem('cuestionario_questions', JSON.stringify(questions)); }, [questions]);
        useEffect(() => { localStorage.setItem('cuestionario_currentIndex', currentIndex); }, [currentIndex]);
        useEffect(() => { localStorage.setItem('cuestionario_score', score); }, [score]);
        useEffect(() => { localStorage.setItem('cuestionario_correctCount', correctCount); }, [correctCount]);
        useEffect(() => { localStorage.setItem('cuestionario_wrongCount', wrongCount); }, [wrongCount]);
        useEffect(() => { localStorage.setItem('cuestionario_gameStarted', gameStarted); }, [gameStarted]);
        useEffect(() => { localStorage.setItem('cuestionario_gameOver', gameOver); }, [gameOver]);
        useEffect(() => { localStorage.setItem('cuestionario_disabledOptions', JSON.stringify(disabledOptions)); }, [disabledOptions]);
        useEffect(() => { localStorage.setItem('cuestionario_failedQuestions', JSON.stringify(failedQuestions)); }, [failedQuestions]);
        useEffect(() => {
          if (gameMode) localStorage.setItem('cuestionario_gameMode', gameMode);
          else localStorage.removeItem('cuestionario_gameMode');
        }, [gameMode]);

        // --- Ambient Background Effect ---
        useEffect(() => {
          if (gameMode !== 'module3' || !highContrast || !gradientRef.current) return;

          let animationFrameId;
          const colors = [
            [62, 35, 255],
            [60, 255, 60],
            [255, 35, 98],
            [45, 175, 230],
            [255, 0, 255],
            [255, 128, 0]
          ];
          
          let step = 0;
          let colorIndices = [0, 1, 2, 3];
          const gradientSpeed = 0.002;

          const updateGradient = () => {
            if (!gradientRef.current) return;

            const c0_0 = colors[colorIndices[0]];
            const c0_1 = colors[colorIndices[1]];
            const c1_0 = colors[colorIndices[2]];
            const c1_1 = colors[colorIndices[3]];

            const istep = 1 - step;
            const r1 = Math.round(istep * c0_0[0] + step * c0_1[0]);
            const g1 = Math.round(istep * c0_0[1] + step * c0_1[1]);
            const b1 = Math.round(istep * c0_0[2] + step * c0_1[2]);
            const color1 = `rgb(${r1},${g1},${b1})`;

            const r2 = Math.round(istep * c1_0[0] + step * c1_1[0]);
            const g2 = Math.round(istep * c1_0[1] + step * c1_1[1]);
            const b2 = Math.round(istep * c1_0[2] + step * c1_1[2]);
            const color2 = `rgb(${r2},${g2},${b2})`;

            gradientRef.current.style.background = `linear-gradient(to right, ${color1} 0%, ${color2} 100%)`;

            step += gradientSpeed;
            if (step >= 1) {
              step %= 1;
              colorIndices[0] = colorIndices[1];
              colorIndices[2] = colorIndices[3];

              colorIndices[1] = (colorIndices[1] + Math.floor(1 + Math.random() * (colors.length - 1))) % colors.length;
              colorIndices[3] = (colorIndices[3] + Math.floor(1 + Math.random() * (colors.length - 1))) % colors.length;
            }
            
            animationFrameId = requestAnimationFrame(updateGradient);
          };

          animationFrameId = requestAnimationFrame(updateGradient);

          return () => {
             cancelAnimationFrame(animationFrameId);
             if (gradientRef.current) gradientRef.current.style.background = '';
          };
        }, [gameMode, highContrast]);

        // --- Core Effects ---

        const progressPercent = useMemo(() => {
          if (!totalQuestions) return 0;
          return ((currentIndex + 1) / totalQuestions) * 100;
        }, [currentIndex, totalQuestions]);

        useEffect(() => {
          if (questions.length > 0 && currentIndex < questions.length) {
            prepareOptionsForCurrentQuestion();
          } else {
            setOptions([]);
          }
          // eslint-disable-next-line react-hooks/exhaustive-deps
        }, [questions, currentIndex]);

        useEffect(() => {
          return () => {
            if (timeoutRef.current) clearTimeout(timeoutRef.current);
          };
        }, []);

        useEffect(() => {
          if (gameOver) {
            sfxCelebration.current.currentTime = 0;
            sfxCelebration.current.play().catch(() => { });
          }
        }, [gameOver]);

        const handleRemoveData = () => {
          if (window.confirm('¿Estás seguro de que deseas borrar los datos guardados y empezar de cero?')) {
            localStorage.clear();
            setRawRows([]);
            setQuestions([]);
            setGameStarted(false);
            setGameOver(false);
            setGameMode(null);
            setCurrentIndex(0);
            setScore(0);
            setCorrectCount(0);
            setWrongCount(0);
            setDisabledOptions([]);
            setFailedQuestions([]);
            setRevealed(false);
            setLoadingFile(false);
          }
        };

        function handleFileChange(e) {
          const file = e.target.files?.[0];
          if (!file) return;
          setLoadingFile(true);

          const reader = new FileReader();
          reader.onload = (evt) => {
            try {
              const data = evt.target.result;
              const workbook = XLSX.read(data, { type: "array" });
              const firstSheetName = workbook.SheetNames[0];
              const worksheet = workbook.Sheets[firstSheetName];
              const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

              const parsed = rows
                .filter(
                  (row) =>
                    Array.isArray(row) &&
                    row.length >= 2 &&
                    row[0] != null &&
                    row[1] != null &&
                    String(row[1]).trim() !== ""
                )
                .map((row) => ({
                  question: String(row[0]).trim(),
                  answer: String(row[1]).trim(),
                }));

              if (parsed.length < 2) {
                alert(
                  "El archivo debe tener al menos dos filas válidas con pregunta (columna 1) y respuesta (columna 2)."
                );
                setLoadingFile(false);
                return;
              }

              setRawRows(parsed);
              setGameStarted(false);
              setGameOver(false);
              setGameMode(null);
              setSelectedOption(null);
              setFeedback(null);
            } catch (error) {
              console.error(error);
              alert("Hubo un problema al leer el archivo Excel.");
            } finally {
              setLoadingFile(false);
            }
          };
          reader.onerror = () => {
            alert("No se pudo leer el archivo.");
            setLoadingFile(false);
          };

          reader.readAsArrayBuffer(file);
          e.target.value = "";
        }

        function prepareOptionsForCurrentQuestion() {
          const current = questions[currentIndex];
          if (!current) return;

          const otherAnswers = questions
            .filter((_, idx) => idx !== currentIndex)
            .map((q) => q.answer)
            .filter((a) => a !== current.answer);

          // Shuffle distractors and pick up to 3
          const shuffledOthers = shuffleArray(otherAnswers);
          const numDistractors = Math.min(3, shuffledOthers.length);
          const distractors = shuffledOthers.slice(0, numDistractors).map((text) => ({
            text,
            isCorrect: false,
          }));

          const opts = shuffleArray([
            { text: current.answer, isCorrect: true },
            ...distractors,
          ]);

          setOptions(opts);
          setSelectedOption(null);
          setFeedback(null);
          setDisabledOptions([]);
        }

        function playSound(ref) {
          try {
            ref.current.currentTime = 0;
            ref.current.play();
          } catch (_) { }
        }

        function triggerConfetti() {
          if (typeof confetti !== "function") return;
          confetti({
            particleCount: 120,
            spread: 70,
            origin: { y: 0.6 },
          });
        }

        function handleOptionClick(option) {
          if (!options.length || selectedOption || disabledOptions.includes(option.text)) return;

          // Desbloquear celebration en el primer gesto del usuario
          if (!celebrationUnlocked.current) {
            celebrationUnlocked.current = true;
            sfxCelebration.current.play().then(() => {
              sfxCelebration.current.pause();
              sfxCelebration.current.currentTime = 0;
            }).catch(() => { });
          }

          setSelectedOption(option);

          const isCorrect = option.isCorrect;
          if (isCorrect) {
            setFeedback({ type: "correct", message: "¡Correcto!" });
            playSound(sfxCorrect);
            const pts = Math.round(100 / questions.length);
            setScore((s) => s + (disabledOptions.length === 0 ? pts : 0));
            if (disabledOptions.length === 0) setCorrectCount((c) => c + 1);
            triggerConfetti();
            if (timeoutRef.current) clearTimeout(timeoutRef.current);
            timeoutRef.current = setTimeout(() => {
              goToNextQuestion();
            }, 1600);
          } else {
            // Track failed question (only first wrong attempt per question)
            if (disabledOptions.length === 0) {
              const current = questions[currentIndex];
              setFailedQuestions((prev) => {
                const alreadyTracked = prev.some(
                  (q) => q.answer === current.answer && q.question === current.question
                );
                return alreadyTracked ? prev : [...prev, current];
              });
            }
            setFeedback({ type: "wrong", message: "Incorrecto. ¡Intenta de nuevo!" });
            playSound(sfxError);
            setWrongCount((c) => c + 1);
            if (timeoutRef.current) clearTimeout(timeoutRef.current);
            timeoutRef.current = setTimeout(() => {
              setDisabledOptions((prev) => [...prev, option.text]);
              setSelectedOption(null);
              setFeedback(null);
            }, 1600);
          }
        }

        function goToNextQuestion() {
          setCurrentIndex((idx) => {
            if (idx + 1 >= questions.length) {
              setGameOver(true);
              return idx;
            }
            return idx + 1;
          });
          setSelectedOption(null);
          setFeedback(null);
        }

        function handleRestart() {
          if (!rawRows.length) {
            setGameStarted(false);
            setGameOver(false);
            setGameMode(null);
            return;
          }
          startModule(gameMode);
        }

        function handleReviewFailed() {
          if (!failedQuestions.length) return;
          const shuffled = shuffleArray(failedQuestions);
          setQuestions(shuffled);
          setCurrentIndex(0);
          setScore(0);
          setCorrectCount(0);
          setWrongCount(0);
          setGameOver(false);
          setGameStarted(true);
          setSelectedOption(null);
          setFeedback(null);
          setFailedQuestions([]);
          setRevealed(false);
        }

        function startModule(mode) {
          const shuffled = shuffleArray(rawRows);
          setQuestions(shuffled);
          setCurrentIndex(0);
          setScore(0);
          setCorrectCount(0);
          setWrongCount(0);
          setGameOver(false);
          setGameStarted(true);
          setGameMode(mode);
          setSelectedOption(null);
          setFeedback(null);
          setFailedQuestions([]);
          setRevealed(false);
        }

        function handleChangeModule() {
          setGameStarted(false);
          setGameOver(false);
          setGameMode(null);
          setSelectedOption(null);
          setFeedback(null);
          setRevealed(false);
        }

        function askConfirm(message, onAccept) {
          setConfirm({ message, onAccept });
        }

        function closeConfirm() {
          setConfirm(null);
        }

        function handleFlashcardNext() {
          setRevealed(false);
          goToNextQuestion();
        }

        const currentQuestion =
          questions.length && currentIndex < questions.length
            ? questions[currentIndex]
            : null;

        const successPercentage =
          correctCount + wrongCount === 0
            ? 0
            : Math.round((correctCount / (correctCount + wrongCount)) * 100);

        return (
          <div className={`app-root ${gameMode === 'module3' ? 'dark-theme' : ''}`}>
            <div className="background-gradient" />
            <div className="floating-orb orb-1" />
            <div className="floating-orb orb-2" />
            <div className="app-container">
              {gameMode !== 'module3' && (
                <header className="app-header">
                  <h1>Cuestionario App</h1>
                  <p className="subtitle">
                    Estudia tus conceptos convirtiendo tu Excel en un juego rápido.
                  </p>
                </header>
              )}

              <section className="top-bar" style={{ display: gameMode === 'module3' ? 'none' : '' }}>
                {rawRows.length === 0 && (
                  <div className="file-input-wrapper">
                    <label className="file-label">
                      <span>📁 Cargar archivo Excel</span>
                      <input
                        type="file"
                        accept=".xlsx,.xls"
                        onChange={handleFileChange}
                      />
                    </label>
                    <p className="file-help">
                      Columna 1: pregunta · Columna 2: respuesta correcta
                    </p>
                  </div>
                )}

              </section>

              {gameStarted && !gameOver && gameMode !== 'module3' && (
                <section className="progress-bar-wrapper">
                  <div className="progress-bar">
                    <div
                      className="progress-fill"
                      style={{ width: `${progressPercent}%` }}
                    />
                  </div>
                </section>
              )}

              {rawRows.length === 0 && (
                <section className="welcome-card">
                  <h2>Sube tu archivo para empezar</h2>
                  <p>
                    Carga tu Excel una vez y elige entre dos modos de estudio:
                    cuestionario de opción múltiple o flashcard.
                  </p>
                  <p>Columna 1: pregunta · Columna 2: respuesta correcta.</p>
                </section>
              )}

              {rawRows.length > 0 && !gameStarted && !gameOver && (
                <section className="hub-screen">
                  <h2>¿Qué módulo quieres practicar?</h2>
                  <p className="hub-subtitle">
                    {rawRows.length} pregunta{rawRows.length !== 1 ? 's' : ''} cargada{rawRows.length !== 1 ? 's' : ''}
                  </p>
                  <div className="hub-buttons">
                    <button className="hub-btn" onClick={() => startModule('quiz')}>
                      <span className="hub-icon">🎯</span>
                      <span className="hub-title">Módulo 1</span>
                      <span className="hub-desc">Opción múltiple con puntaje</span>
                    </button>
                    <button className="hub-btn" onClick={() => startModule('flashcard')}>
                      <span className="hub-icon">👁️</span>
                      <span className="hub-title">Módulo 2</span>
                      <span className="hub-desc">Flashcard – Revelar respuesta</span>
                    </button>
                    <button className="hub-btn" onClick={() => startModule('module3')}>
                      <span className="hub-icon">🌙</span>
                      <span className="hub-title">Módulo 3</span>
                      <span className="hub-desc">Foco oscuro, pregunta y respuesta</span>
                    </button>
                  </div>
                  <button className="ghost-button" onClick={handleRemoveData} style={{ marginTop: '2rem', color: '#ef4444', borderColor: '#ef4444' }}>
                    🗑️ Borrar memoria y empezar de cero
                  </button>
                </section>
              )}

              {loadingFile && (
                <div className="overlay-message">
                  <div className="overlay-card">
                    <div className="spinner" />
                    <p>Leyendo archivo Excel...</p>
                  </div>
                </div>
              )}

              {gameStarted && !gameOver && gameMode === 'module3' && currentQuestion && (
                <main className="module3-area">
                  <div ref={gradientRef} className={`m3-animated-bg ${highContrast ? 'active' : ''}`} />
                  <Clock highContrast={highContrast} />
                  <div 
                    className="m3-question-text" 
                    style={{ color: highContrast ? '#ffffff' : '#6b7280' }}
                    onClick={() => {
                      if (!revealed && !celebrationUnlocked.current) {
                        celebrationUnlocked.current = true;
                        sfxCelebration.current.play().then(() => {
                          sfxCelebration.current.pause();
                          sfxCelebration.current.currentTime = 0;
                        }).catch(() => { });
                      }
                      setRevealed(!revealed);
                    }}
                  >
                    {currentQuestion.question}
                  </div>
                  <div
                    className="m3-answer-box"
                    style={{ 
                      color: highContrast ? '#ffffff' : '#6b7280',
                      background: highContrast ? 'transparent' : '',
                      borderColor: highContrast ? 'transparent' : ''
                    }}
                  >
                    <span style={{ opacity: revealed ? 1 : 0, transition: 'opacity 0.2s' }}>
                      {currentQuestion.answer}
                    </span>
                  </div>
                  <div className="m3-actions">
                    <button
                      className={`m3-next-btn-dark ${highContrast ? 'transparent-btn' : ''}`}
                      onClick={() => {
                        setRevealed(false);
                        setCurrentIndex((prev) => Math.max(0, prev - 1));
                      }}
                      disabled={currentIndex === 0}
                    >
                      ◀
                    </button>
                    <button
                      className={`m3-next-btn-dark ${highContrast ? 'transparent-btn' : ''}`}
                      onClick={() => setHighContrast(!highContrast)}
                      title="Cambiar color de texto"
                    >
                      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                      </svg>
                    </button>
                    <button
                      className={`m3-next-btn-dark ${highContrast ? 'transparent-btn' : ''}`}
                      onClick={() => askConfirm('¿Cambiar de módulo? Se perderá el progreso actual.', handleChangeModule)}
                      title="Cambiar módulo"
                    >
                      ⛌
                    </button>
                    <button className={`m3-next-btn-dark ${highContrast ? 'transparent-btn' : ''}`} onClick={() => {
                      setRevealed(false);
                      goToNextQuestion();
                    }}>
                      {currentIndex + 1 < totalQuestions ? '▶' : '■'}
                    </button>
                  </div>
                </main>
              )}

              {gameStarted && !gameOver && gameMode === 'quiz' && currentQuestion && (
                <main className="game-area">
                  <div className="question-card question-enter">
                    <div className="question-label">Pregunta</div>
                    <div className="question-text">{currentQuestion.question}</div>
                  </div>

                  <div className="options-container">
                    {options.map((opt, idx) => {
                      const isSelected =
                        selectedOption && selectedOption.text === opt.text;
                      const isEliminated = disabledOptions.includes(opt.text);
                      const labels = ["A", "B", "C", "D"];

                      let className = "option-button";
                      if (isEliminated) {
                        className += " option-eliminated";
                      } else if (isSelected && feedback?.type === "correct") {
                        className += " option-correct option-pulse";
                      } else if (isSelected && feedback?.type === "wrong") {
                        className += " option-wrong option-shake";
                      }

                      return (
                        <button
                          key={idx}
                          className={className}
                          onClick={() => handleOptionClick(opt)}
                          disabled={!!selectedOption || isEliminated}
                        >
                          <span className="option-label">{labels[idx]}</span>
                          {opt.text}
                        </button>
                      );
                    })}
                  </div>

                  {feedback && (
                    <div
                      className={
                        feedback.type === "correct"
                          ? "feedback feedback-correct"
                          : "feedback feedback-wrong"
                      }
                    >
                      {feedback.message}
                    </div>
                  )}
                </main>
              )}

              {gameStarted && !gameOver && gameMode === 'quiz' && (
                <div className="stats">
                  <div className="stat-item">
                    <span className="stat-label">Puntaje</span>
                    <span className="stat-value">{score}</span>
                  </div>
                  <div className="stat-item">
                    <span className="stat-label">Aciertos</span>
                    <span className="stat-value stat-ok">{correctCount}</span>
                  </div>
                  <div className="stat-item">
                    <span className="stat-label">Errores</span>
                    <span className="stat-value stat-bad">{wrongCount}</span>
                  </div>
                  <div className="stat-item">
                    <span className="stat-label">Progreso</span>
                    <span className="stat-value">
                      {totalQuestions ? `${currentIndex + 1} / ${totalQuestions}` : "-"}
                    </span>
                  </div>
                </div>
              )}

              {gameStarted && !gameOver && gameMode === 'flashcard' && currentQuestion && (
                <main className="flashcard-area">
                  <div className="question-card">
                    <div className="question-label">
                      Pregunta {currentIndex + 1} / {totalQuestions}
                    </div>
                    <div className="question-text">{currentQuestion.question}</div>
                  </div>
                  {!revealed ? (
                    <button className="reveal-btn" onClick={() => {
                      if (!celebrationUnlocked.current) {
                        celebrationUnlocked.current = true;
                        sfxCelebration.current.play().then(() => {
                          sfxCelebration.current.pause();
                          sfxCelebration.current.currentTime = 0;
                        }).catch(() => { });
                      }
                      playSound(sfxCorrect);
                      setRevealed(true);
                    }}>
                      👁️ Ver respuesta
                    </button>
                  ) : (
                    <>
                      <div className="answer-reveal">{currentQuestion.answer}</div>
                      <button className="reveal-next-btn" onClick={handleFlashcardNext}>
                        {currentIndex + 1 < totalQuestions ? 'Siguiente →' : '✅ Ver resultados'}
                      </button>
                    </>
                  )}
                </main>
              )}

              {gameStarted && !gameOver && gameMode === 'flashcard' && (
                <div className="bottom-actions">
                  <button className="ghost-button" onClick={() => askConfirm('¿Reiniciar la ronda desde el principio?', handleRestart)}>
                    Reiniciar ronda
                  </button>
                  <button className="ghost-button" onClick={() => askConfirm('¿Cambiar de módulo? Se perderá el progreso actual.', handleChangeModule)}>
                    🔀 Cambiar módulo
                  </button>
                </div>
              )}

              {confirm && (
                <div className="confirm-overlay">
                  <div className="confirm-card">
                    <p className="confirm-message">{confirm.message}</p>
                    <div className="confirm-actions">
                      <button className="confirm-cancel" onClick={closeConfirm}>Cancelar</button>
                      <button className="confirm-accept" onClick={() => { confirm.onAccept(); closeConfirm(); }}>Aceptar</button>
                    </div>
                  </div>
                </div>
              )}

              {gameOver && (
                <section className="results-card">
                  {gameMode === 'quiz' ? (
                    <>
                      <h2>Resultados finales</h2>
                      <div className="results-grid">
                        <div className="result-item">
                          <span className="result-label">Total de preguntas</span>
                          <span className="result-value">{totalQuestions}</span>
                        </div>
                        <div className="result-item">
                          <span className="result-label">Aciertos</span>
                          <span className="result-value stat-ok">{correctCount}</span>
                        </div>
                        <div className="result-item">
                          <span className="result-label">Errores</span>
                          <span className="result-value stat-bad">{wrongCount}</span>
                        </div>
                        <div className="result-item">
                          <span className="result-label">Porcentaje de éxito</span>
                          <span className="result-value">
                            {successPercentage}<span className="result-unit">%</span>
                          </span>
                        </div>
                        <div className="result-item">
                          <span className="result-label">Puntaje final</span>
                          <span className="result-value">{score}</span>
                        </div>
                      </div>
                    </>
                  ) : (
                    <>
                      <h2>¡Ronda completada!</h2>
                      <div className="results-grid">
                        <div className="result-item">
                          <span className="result-label">Tarjetas revisadas</span>
                          <span className="result-value">{totalQuestions}</span>
                        </div>
                      </div>
                    </>
                  )}
                  <div className="results-actions">
                    <button className="restart-button" onClick={handleRestart}>
                      🔁 Repetir ronda
                    </button>
                    <button className="change-module-btn" onClick={handleChangeModule}>
                      🔀 Cambiar módulo
                    </button>
                    {gameMode === 'quiz' && failedQuestions.length > 0 && (
                      <button className="review-button" onClick={handleReviewFailed}>
                        🔁 Repasar {failedQuestions.length} error{failedQuestions.length !== 1 ? "es" : ""}
                      </button>
                    )}
                  </div>
                </section>
              )}

              {gameStarted && !gameOver && gameMode === 'quiz' && (
                <div className="bottom-actions">
                  <button className="ghost-button" onClick={handleRestart}>
                    Reiniciar ronda
                  </button>
                  <button className="ghost-button" onClick={handleChangeModule}>
                    🔀 Cambiar módulo
                  </button>
                </div>
              )}

              <footer className="app-footer" style={{ display: gameMode === 'module3' ? 'none' : '' }}>
                <span>
                  Carga tu Excel y convierte el estudio en un juego interactivo.
                </span>
              </footer>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    }
  </script>
</body>

</html>
